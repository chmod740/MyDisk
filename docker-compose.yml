services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: django_disk
      POSTGRES_USER: django
      POSTGRES_PASSWORD: diskpass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django -d django_disk"]
      interval: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://django:diskpass123@db:5432/django_disk
      DJANGO_SECRET_KEY: docker-prod-secret-key-change-me
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 60
      "

volumes:
  pgdata:
  media_data:
