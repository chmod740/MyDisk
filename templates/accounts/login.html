{% extends 'base.html' %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-8">
        <h1 class="text-2xl font-bold dark:text-white text-center mb-6">登录 DjangoDisk</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            {% if captcha_required %}
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">验证码</label>
                <img src="{% url 'captcha_image' %}" alt="验证码" class="rounded-lg border border-gray-300 dark:border-gray-600 mb-2" onclick="this.src='{% url 'captcha_image' %}?'+new Date().getTime()" style="cursor:pointer" title="点击刷新">
                <input type="text" name="captcha" required maxlength="4"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                       placeholder="请输入图片中的字符" autocomplete="off">
            </div>
            {% endif %}
            <button type="submit" class="w-full py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700 font-medium">
                登录
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            没有账号？<a href="{% url 'register' %}" class="text-primary-600 hover:underline">注册</a>
        </p>
    </div>
</div>
{% endblock %}
