{% extends 'base.html' %}
{% block title %}删除用户组{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 dark:border-gray-700 p-6 text-center">
        <h2 class="text-xl font-bold dark:text-white mb-2">删除用户组 "{{ group.name }}"</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 dark:text-gray-400 mb-2">该组当前有 {{ user_count }} 个用户</p>
        <p class="text-sm text-red-500 mb-6">删除后，所有用户将被移出该组，但不会被删除。</p>

        {% if group.is_default %}
        <div class="bg-yellow-50 text-yellow-700 rounded-lg p-3 text-sm mb-4">
            无法删除默认组。请先将其他组设为默认组后再操作。
        </div>
        <a href="{% url 'admin_group_list' %}" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700">返回</a>
        {% else %}
        <form method="post" class="flex justify-center space-x-3">
            {% csrf_token %}
            <a href="{% url 'admin_group_list' %}" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700">取消</a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">确认删除</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
