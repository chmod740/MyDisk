<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" @click.self="$el.remove()">
    <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-xl shadow-xl p-6 w-96">
        <h3 class="text-lg font-semibold dark:text-white mb-2">删除文件</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 dark:text-gray-400 mb-4">确定要删除 "{{ file.name }}" 吗？文件将被移至回收站。</p>
        <form method="post" action="{% url 'file_delete' file.id %}"
              hx-post="{% url 'file_delete' file.id %}" hx-target="#modal-container" hx-swap="outerHTML">
            {% csrf_token %}
            <div class="flex justify-end space-x-2">
                <button type="button" @click="$el.closest('.fixed').remove()"
                        class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700">取消</button>
                <button type="submit" class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700">删除</button>
            </div>
        </form>
    </div>
</div>
