<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" @click.self="$el.remove()">
    <div class="bg-white dark:bg-gray-800 dark:bg-gray-800 rounded-xl shadow-xl p-6 w-96">
        <h3 class="text-lg font-semibold dark:text-white mb-4">移动 "{{ file.name }}"</h3>
        <form method="post" action="{% url 'file_move' file.id %}"
              hx-post="{% url 'file_move' file.id %}" hx-target="#modal-container" hx-swap="outerHTML">
            {% csrf_token %}
            <select name="target_folder" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg mb-4">
                <option value="">📁 根目录</option>
                {% for fid, fname in all_folders %}
                    <option value="{{ fid }}">📁 {{ fname }}</option>
                {% endfor %}
            </select>
            <div class="flex justify-end space-x-2">
                <button type="button" @click="$el.closest('.fixed').remove()"
                        class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700">取消</button>
                <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">移动</button>
            </div>
        </form>
    </div>
</div>
