{% load static %}
<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需要密码 - {{ site_name }} 分享</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } } };
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 flex items-center justify-center">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-8 w-96">
        <div class="text-center mb-6">
            <svg class="w-12 h-12 mx-auto text-yellow-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <h2 class="text-xl font-bold dark:text-white">此分享需要密码</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ link.owner.username }} 分享的{% if link.file %}文件{% else %}文件夹{% endif %}</p>
        </div>

        {% if error %}
        <div class="mb-4 px-3 py-2 bg-red-50 text-red-600 text-sm rounded-lg">{{ error }}</div>
        {% endif %}

        <form method="post" class="space-y-3">
            {% csrf_token %}
            <input type="password" name="password" placeholder="请输入访问密码" required
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 text-center">
            <button type="submit" class="w-full py-2.5 bg-primary-600 text-white rounded-lg hover:bg-primary-700 font-medium">
                验证
            </button>
        </form>
    </div>
<button id="theme-float-btn" onclick="let h=document.documentElement;h.classList.toggle('dark');let d=h.classList.contains('dark');localStorage.setItem('theme',d?'dark':'light');this.querySelector('.moon').style.display=d?'none':'';this.querySelector('.sun').style.display=d?'':'none'" class="fixed bottom-6 right-6 z-50 p-3 bg-white dark:bg-gray-700 rounded-full shadow-lg border border-gray-200 dark:border-gray-600 hover:shadow-xl transition" title="切换主题"><svg class="w-5 h-5 text-gray-500 moon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg><svg class="w-5 h-5 text-yellow-400 sun" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></button><script>if(localStorage.getItem('theme')==='dark'){let b=document.getElementById('theme-float-btn');b.querySelector('.moon').style.display='none';b.querySelector('.sun').style.display='';}</script></body>
</html>
