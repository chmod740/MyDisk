<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50" @click.self="$el.remove()">
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md p-6">
    <h3 class="text-lg font-semibold dark:text-white mb-4">创建分享链接</h3>
    <form method="post" action="{% url 'share_create' %}"
          hx-post="{% url 'share_create' %}" hx-target="#modal-container" hx-swap="outerHTML">
        {% csrf_token %}
        {% if request.GET.file_id %}
            <input type="hidden" name="file_id" value="{{ request.GET.file_id }}">
        {% endif %}
        {% if request.GET.folder_id %}
            <input type="hidden" name="folder_id" value="{{ request.GET.folder_id }}">
        {% endif %}
        {% if request.GET.bucket_id %}
            <input type="hidden" name="bucket_id" value="{{ request.GET.bucket_id }}">
        {% endif %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">访问密码（可选）</label>
            <input type="text" name="password" placeholder="留空则不设置密码"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">有效期（天，可选）</label>
            <input type="number" name="expires_days" placeholder="留空则永久有效" min="1"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm">
        </div>
        <div class="flex justify-end space-x-2">
            <button type="button" @click="$el.closest('.fixed').remove()"
                    class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">取消</button>
            <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">创建分享</button>
        </div>
    </form>
</div>
</div>
