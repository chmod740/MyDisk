{% extends 'base.html' %}
{% block title %}创建分享{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold dark:text-white mb-6">创建分享链接</h1>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-6">
        <form method="post">
            {% csrf_token %}
            {% if request.GET.file_id %}
                <input type="hidden" name="file_id" value="{{ request.GET.file_id }}">
            {% elif request.GET.folder_id %}
                <input type="hidden" name="folder_id" value="{{ request.GET.folder_id }}">
            {% endif %}

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">访问密码（可选）</label>
                <input type="text" name="password" placeholder="留空则不设置密码"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">有效期（天，可选）</label>
                <input type="number" name="expires_days" placeholder="留空则永久有效" min="1"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>

            <div class="flex justify-end space-x-2">
                <a href="{% url 'file_list' %}" class="px-4 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">取消</a>
                <button type="submit" class="px-4 py-2 text-sm bg-primary-600 text-white rounded-lg hover:bg-primary-700">创建分享</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
