{% extends 'base.html' %}
{% load static %}
{% block title %}编辑 - {{ file.name }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github.min.css">
<link rel="stylesheet" href="https://unpkg.com/github-markdown-css@5.8.1/github-markdown.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
<link rel="stylesheet" href="{% static 'css/markdown-editor.css' %}">
<script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.min.js"></script>
{% include 'includes/markdown_theme.html' %}
{% endblock %}

{% block content %}
<div class="markdown-editor view-split preview-theme-github max-w-full mx-auto"
     data-markdown-editor
     data-image-upload-url="{% url 'bucket_image_upload' bucket.id %}"
     data-folder-path="{{ file.folder_path }}">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
        <div class="flex min-w-0 items-center gap-3">
            <a href="{% url 'bucket_detail' bucket.id %}{% if file.folder_path %}?path={{ file.folder_path }}{% endif %}"
               class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">&larr; 返回</a>
            <h1 class="text-lg font-bold dark:text-white truncate max-w-md">{{ file.name }}</h1>
            <span class="text-xs text-gray-500 dark:text-gray-400 hidden sm:inline" data-render-status>就绪</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 dark:text-gray-400 hidden sm:inline" data-word-count></span>
            <form method="post" data-markdown-form>
                {% csrf_token %}
                <input type="hidden" name="content" data-content-input>
                <button type="submit" class="px-5 py-2 bg-primary-600 text-white text-sm rounded-lg hover:bg-primary-700 font-medium">保存</button>
            </form>
        </div>
    </div>

    <div class="editor-commandbar">
        <div class="format-toolbar" data-format-toolbar aria-label="Markdown 格式工具栏">
            <button type="button" title="粗体 (Ctrl+B)" data-action="bold"><b>B</b></button>
            <button type="button" title="斜体 (Ctrl+I)" data-action="italic"><i>I</i></button>
            <button type="button" title="删除线" data-action="strikethrough"><s>S</s></button>
            <span class="sep"></span>
            <button type="button" title="标题" data-action="heading">H</button>
            <button type="button" title="引用" data-action="quote">&ldquo;</button>
            <button type="button" title="无序列表" data-action="ul">&bull;</button>
            <button type="button" title="有序列表" data-action="ol">1.</button>
            <button type="button" title="任务列表" data-action="task">&#9744;</button>
            <span class="sep"></span>
            <button type="button" title="链接 (Ctrl+K)" data-action="link">&#128279;</button>
            <button type="button" title="上传图片" data-action="image">&#128247;</button>
            <input type="file" data-image-input accept="image/*" hidden>
            <button type="button" title="行内代码" data-action="code">&lt;/&gt;</button>
            <button type="button" title="代码块" data-action="codeblock">```</button>
            <button type="button" title="表格" data-action="table">&#9776;</button>
            <button type="button" title="分割线" data-action="hr">&mdash;</button>
        </div>
        <div class="editor-options">
            <div class="view-switch" role="group" aria-label="编辑器视图">
                <button type="button" data-view-mode="edit" aria-pressed="false">编辑</button>
                <button type="button" data-view-mode="split" aria-pressed="true">分栏</button>
                <button type="button" data-view-mode="preview" aria-pressed="false">预览</button>
            </div>
            <label class="preview-theme-control">排版
                <select data-preview-theme aria-label="预览排版主题">
                    <option value="github">GitHub</option>
                    <option value="clean">简洁阅读</option>
                    <option value="wechat">公众号</option>
                </select>
            </label>
            <label class="scroll-sync-control">
                <input type="checkbox" data-scroll-sync checked> 同步滚动
            </label>
            <button type="button" class="copy-html-button" data-copy-html>复制 HTML</button>
        </div>
    </div>

    <div class="editor-layout">
        <div class="editor-pane">
            <textarea class="markdown-source" data-markdown-source placeholder="开始编写 Markdown...">{{ content }}</textarea>
        </div>
        <div class="preview-pane" data-preview-pane>
            <div class="markdown-body markdown-preview" data-markdown-preview></div>
        </div>
    </div>
</div>
<script src="{% static 'js/markdown-editor.js' %}"></script>
{% endblock %}
