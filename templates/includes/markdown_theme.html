<script>
(function () {
    var mermaidRenderStates = new WeakMap();

    if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'strict'
        });
    }

    window.markdownThemeIsDark = function () {
        return document.documentElement.classList.contains('dark');
    };

    window.renderMarkdownMermaid = function (root) {
        if (typeof mermaid === 'undefined') return Promise.resolve();
        root = root || document;
        var blocks = root.querySelectorAll('.mermaid');
        if (!blocks.length) return Promise.resolve();

        var state = mermaidRenderStates.get(root) || { running: false, pending: false };
        mermaidRenderStates.set(root, state);
        if (state.running) {
            state.pending = true;
            return state.promise;
        }

        blocks.forEach(function (block) {
            block.classList.remove('mermaid-error');
            if (!block.dataset.mermaidSource) {
                block.dataset.mermaidSource = block.textContent;
            } else if (block.dataset.processed) {
                block.textContent = block.dataset.mermaidSource;
                block.removeAttribute('data-processed');
            }
        });

        mermaid.initialize({
            startOnLoad: false,
            theme: window.markdownThemeIsDark() ? 'dark' : 'default',
            securityLevel: 'strict',
            flowchart: { htmlLabels: false }
        });
        state.running = true;
        state.promise = Promise.resolve(
            mermaid.run({
                nodes: Array.prototype.slice.call(blocks),
                suppressErrors: true
            })
        ).catch(function () {
            blocks.forEach(function (block) {
                if (!block.querySelector('svg')) {
                    block.textContent = block.dataset.mermaidSource || '';
                    block.classList.add('mermaid-error');
                    block.title = 'Mermaid 图表语法错误';
                }
            });
        }).finally(function () {
            state.running = false;
            if (state.pending) {
                state.pending = false;
                setTimeout(function () { window.renderMarkdownMermaid(root); }, 0);
            }
        });
        return state.promise;
    };

    if (!window.markdownThemeObserver) {
        window.markdownThemeObserver = new MutationObserver(function () {
            document.querySelectorAll('.markdown-body').forEach(function (body) {
                window.renderMarkdownMermaid(body);
            });
        });
        window.markdownThemeObserver.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ['class']
        });
    }
})();
</script>
